<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>קלמוש | יד שרה</title>
    <style>
        :root {
            --bg: #0a0f18;
            --panel: #161f2e;
            --accent: #38bdf8;
            --success: #22c55e;
            --warning: #f59e0b;
            --danger: #f43f5e;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body { 
            margin: 0; 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background: var(--bg); 
            color: var(--text-main); 
            direction: rtl; 
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header { background: rgba(22, 31, 46, 0.9); backdrop-filter: blur(10px); padding: 15px; text-align: center; border-bottom: 2px solid var(--accent); position: sticky; top: 0; z-index: 1000; }
        #clock { font-family: 'Courier New', monospace; font-size: 2.5rem; font-weight: 800; color: var(--success); }
        .nav { display: flex; justify-content: center; gap: 10px; margin: 20px 0; }
        .btn { padding: 10px 25px; border-radius: 50px; border: 1px solid rgba(255,255,255,0.1); background: var(--panel); color: white; cursor: pointer; font-weight: bold; }
        .btn.active { background: var(--accent); color: var(--bg); }
        
        .container { 
            max-width: 900px; 
            margin: auto; 
            padding: 0 15px; 
            flex: 1; /* דוחף את הפוטר למטה */
            width: 100%;
            box-sizing: border-box;
        }

        .main-hero {
            background: linear-gradient(145deg, #1e293b, #0f172a);
            border: 3px solid var(--success);
            border-radius: 24px;
            padding: 30px;
            text-align: center;
            margin-bottom: 30px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.5);
        }
        .main-hero h2 { font-size: 2.2rem; margin: 15px 0 5px; }
        .main-hero .phone { font-size: 3rem; color: var(--accent); display: block; margin: 10px 0; font-weight: 900; letter-spacing: 2px; text-decoration: none; }

        .secondary-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .square-card { background: var(--panel); border-radius: 15px; padding: 15px; text-align: center; border: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; justify-content: center; aspect-ratio: 1 / 1; }
        .square-card h3 { margin: 10px 0 5px; font-size: 1.1rem; }
        .square-card p { color: var(--accent); font-weight: bold; margin: 0; font-size: 1rem; }

        .backup-row { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 30px; }
        .backup-item { background: rgba(245, 158, 11, 0.1); border: 1px solid var(--warning); padding: 8px 15px; border-radius: 10px; flex: 1; min-width: 140px; text-align: center; }

        .admin-form { background: var(--panel); padding: 20px; border-radius: 15px; margin-bottom: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .admin-form input, .admin-form select { background: var(--bg); border: 1px solid #334155; color: white; padding: 10px; border-radius: 6px; }
        .search-box { width: 100%; padding: 12px; background: #0f172a; border: 1px solid var(--accent); color: white; border-radius: 8px; margin-bottom: 15px; }
        table { width: 100%; border-collapse: collapse; background: var(--panel); }
        th, td { padding: 12px; border-bottom: 1px solid #334155; text-align: right; }

        footer {
            text-align: center;
            padding: 20px;
            font-size: 0.9rem;
            color: var(--text-muted);
            border-top: 1px solid rgba(255,255,255,0.05);
            background: var(--panel);
            margin-top: 20px;
        }

        @media (max-width: 600px) { .main-hero h2 { font-size: 1.8rem; } .main-hero .phone { font-size: 2.2rem; } .secondary-grid { grid-template-columns: 1fr 1fr; } }
    </style>
</head>
<body>

<header>
    <h1>קלמוש... וכל השאר סתם...</h1>
    <div id="clock">00:00:00</div>
    <div id="date-info" style="color: var(--text-muted); font-size: 0.9rem;"></div>
</header>

<div class="nav">
    <button class="btn active" id="btnMain" onclick="toggleView('main')">לוח כוננים</button>
    <button class="btn" id="btnAdmin" onclick="toggleView('admin')">ניהול</button>
</div>

<div class="container" id="mainView">
    <div id="heroContainer"></div>
    <div class="secondary-grid" id="gridContainer"></div>
    <h3 style="color: var(--warning); border-right: 4px solid var(--warning); padding-right: 10px;">כונני גיבוי/חירום</h3>
    <div class="backup-row" id="backupContainer"></div>
</div>

<div class="container" id="adminView" style="display:none;">
    <div class="admin-form">
        <input type="text" id="nameIn" placeholder="שם כונן" style="grid-column: span 2;">
        <input type="text" id="phoneIn" placeholder="טלפון">
        <select id="dayIn">
            <option value="כל יום">כל יום</option>
            <option value="ראשון">ראשון</option>
            <option value="שני">שני</option>
            <option value="שלישי">שלישי</option>
            <option value="רביעי">רביעי</option>
            <option value="חמישי">חמישי</option>
            <option value="שישי">שישי</option>
            <option value="מוצאי שבת">מוצאי שבת</option>
            <option value="א ב ג ד ה">א ב ג ד ה</option>
        </select>
        <input type="time" id="startIn">
        <input type="time" id="endIn">
        <button class="btn active" onclick="addShift()" style="grid-column: span 2;">הוסף כונן</button>
    </div>
    <input type="text" id="searchIn" class="search-box" placeholder="🔍 חיפוש..." onkeyup="renderAdmin()">
    <button class="btn" onclick="sortShiftsByRelevance()" style="width: 100%; border-color: var(--success); color: var(--success); margin-bottom: 15px;">⇅ מיין לפי רלוונטיות</button>
    <table id="adminTable">
        <thead><tr><th>כונן</th><th>זמן</th><th></th></tr></thead>
        <tbody id="adminBody"></tbody>
    </table>
</div>

<footer>
    כל הזכויות שמורות למערכת <strong>קלמוש</strong> | פותח ע"י <strong>בנימין פ.</strong> © 2026
</footer>

<script>
    const initialShifts = [
        ["יעקב ישראל פלמן","0548435028","כל יום","23:45","00:15"],
        ["מרדכי בלס","0548419190","כל יום","22:00","01:00"],
        ["זאב ביליצר","0527614282","כל יום","23:00","00:00"],
        ["נפתלי סנראי","0548090192","כל יום","23:00","01:30"],
        ["מיכאל פינדר","0548445644","כל יום","23:00","01:00"],
        ["יצחק קרלינסקי","0527694427","כל יום","23:30","01:00"],
        ["אברהם קורנברג","0584158762","כל יום","00:00","01:30"],
        ["משה גרייזמן","0548425337","מוצאי שבת","23:00","04:30"],
        ["ישראל מובשוביץ","0527152353","ראשון","23:00","04:30"],
        ["מרדכי בלס","0548419190","שני","23:00","04:30"],
        ["שמואל דינין","0504152156","שלישי","23:00","04:30"],
        ["יצחק קרלינסקי","0527694427","רביעי","23:00","04:30"],
        ["ישראל קהן","0583299194","חמישי","23:00","04:30"],
        ["אהרון מרדכי מילר","0527160151","כל יום","04:30","08:30"],
        ["אריה קוזניץ","0583288201","א ב ג ד ה","08:30","09:30"],
        ["בן ציון ברדפיס","0527148403","א ב ג ד ה","09:30","13:00"],
        ["יעקב ישראל פלמן","0548435028","כל יום","09:00","13:15"],
        ["יעקב סלמון","0502487806","כל יום","10:00","13:30"],
        ["אלישע הגלר","0533171982","כל יום","11:00","12:00"],
        ["ישראל קהן","0583299194","שישי","10:00","12:00"],
        ["יעקב סלמון","0502487806","כל יום","13:30","14:00"],
        ["יהושע זאבי","0548482257","ב ג ה","13:30","15:30"],
        ["ישראל קהן","0583299194","כל יום","13:30","15:15"],
        ["מרדכי שמואל אדלשטיין","0556749482","כל יום","14:00","15:45"],
        ["אליהו שטיימן","0527663896","כל יום","14:00","14:30"],
        ["אריה קוזניץ","0583288201","כל יום","14:00","16:00"],
        ["יעקב ישראל לסמן","0504147053","כל יום","14:00","16:00"],
        ["משה גרייזמן","0548425337","כל יום","15:00","16:00"],
        ["אהרון מרדכי מילר","0527160151","כל יום","16:00","19:00"],
        ["משה גרייזמן","0548425337","כל יום","16:00","19:00"],
        ["דוד שקלאר","0526289005","כל יום","16:00","19:00"],
        ["יעקב ישראל לסמן","0504147053","כל יום","16:00","19:00"],
        ["אהרון מרדכי מילר","0527160151","כל יום","19:00","21:00"],
        ["יעקב ישראל לסמן","0504147053","כל יום","19:00","23:00"],
        ["דוד שקלאר","0526289005","כל יום","19:00","23:00"],
        ["יהודה בנדיקט","0528442341","כל יום","20:30","21:30"],
        ["יעקב סלמון","0502487806","כל יום","21:00","23:00"],
        ["אריה קוזניץ","0583288201","כל יום","21:00","23:00"],
        ["זאב ביליצר","0527614282","כל יום","22:00","23:00"],
        ["נפתלי סנראי","0548090192","כל יום","22:30","23:00"],
        ["יוסי ביטון","0583214835","כל יום","07:00","23:00"],
        ["אליהו סלמון","0527160570","כל יום","07:00","23:00"],
        ["שמואל דינין","0504152156","כל יום","07:00","23:00"],
        ["עקיבא יוסף קניג","0504116626","כל יום","00:00","00:00"],
        ["אשתו של קניג חירום בלבד","0548408939","כל יום","00:00","00:00"],
        ["בנימין הקשר","0527158183","כל יום","00:00","00:00"]
    ];

    let shifts = JSON.parse(localStorage.getItem('klm_shifts')) || initialShifts;

    function getDayInfo(date) {
        const day = date.getDay(), hour = date.getHours();
        if (day === 6 && hour >= 18) return "מוצאי שבת";
        return ["ראשון", "שני", "שלישי", "רביעי", "חמישי", "שישי", "שבת"][day];
    }

    function updateTime() {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString('he-IL', {hour12: false});
        document.getElementById('date-info').innerText = getDayInfo(now) + " | " + now.toLocaleDateString('he-IL');
        if (now.getSeconds() === 0) renderMain();
    }
    setInterval(updateTime, 1000); updateTime();

    function toMin(t) { if (!t) return 0; const [h, m] = t.split(':').map(Number); return h * 60 + m; }

    function isShiftActive(shift, now) {
        const [name, phone, dayLabel, startStr, endStr] = shift;
        if (startStr === "00:00" && endStr === "00:00") return false;
        const curMin = (now.getHours() * 60) + now.getMinutes();
        const todayLabel = getDayInfo(now);
        const yesterday = new Date(now); yesterday.setDate(yesterday.getDate() - 1);
        const yesterdayLabel = getDayInfo(yesterday);
        const startMin = toMin(startStr), endMin = toMin(endStr);
        const crossesMidnight = endMin <= startMin;

        const dayMatchToday = (dayLabel === "כל יום" || dayLabel === todayLabel || (todayLabel !== "שישי" && todayLabel !== "שבת" && dayLabel === "א ב ג ד ה"));
        if (dayMatchToday) {
            if (!crossesMidnight && curMin >= startMin && curMin < endMin) return true;
            if (crossesMidnight && curMin >= startMin) return true;
        }
        const dayMatchYesterday = (dayLabel === "כל יום" || dayLabel === yesterdayLabel || (yesterdayLabel !== "שישי" && yesterdayLabel !== "שבת" && dayLabel === "א ב ג ד ה"));
        if (dayMatchYesterday && crossesMidnight && curMin < endMin) return true;
        return false;
    }

    function renderMain() {
        const hero = document.getElementById('heroContainer');
        const grid = document.getElementById('gridContainer');
        const backup = document.getElementById('backupContainer');
        hero.innerHTML = ""; grid.innerHTML = ""; backup.innerHTML = "";

        const now = new Date();
        const todayLabel = getDayInfo(now);
        let active = [];
        let backups = [];

        shifts.forEach(s => {
            if (s[3] === "00:00" && s[4] === "00:00") {
                if (s[2] === "כל יום" || s[2] === todayLabel) backups.push(s);
            } else if (isShiftActive(s, now)) {
                active.push(s);
            }
        });

        active.sort((a, b) => {
            const isSpecA = (a[2] !== "כל יום");
            const isSpecB = (b[2] !== "כל יום");
            if (isSpecA && !isSpecB) return -1;
            if (!isSpecA && isSpecB) return 1;
            return toMin(b[3]) - toMin(a[3]);
        });

        active.forEach((s, i) => {
            if (i === 0) {
                hero.innerHTML = `
                <div class="main-hero">
                    <span style="background:var(--success); color:black; padding:4px 12px; border-radius:4px; font-weight:bold;">${s[2] === "כל יום" ? 'כונן (כל יום)' : 'כונן מיוחד להיום'}</span>
                    <h2>${s[0]}</h2>
                    <a href="tel:${s[1]}" class="phone">${s[1]}</a>
                    <div style="color: var(--text-muted); font-size:1.1rem;">משמרת: ${s[3]} - ${s[4]}</div>
                </div>`;
            } else {
                grid.innerHTML += `
                <div class="square-card">
                    <span style="font-size: 0.75rem; color: var(--accent)">${s[2]}</span>
                    <h3>${s[0]}</h3>
                    <p>${s[1]}</p>
                    <div style="font-size: 0.8rem; color: var(--text-muted); margin-top:5px;">${s[3]}-${s[4]}</div>
                </div>`;
            }
        });

        backups.forEach(s => {
            backup.innerHTML += `<div class="backup-item"><strong>${s[0]}</strong><br><small>${s[1]}</small></div>`;
        });
        if (active.length === 0) hero.innerHTML = "<div style='text-align:center; padding:20px; color:var(--text-muted);'>אין כוננים פעילים כרגע</div>";
    }

    function renderAdmin() {
        const body = document.getElementById('adminBody');
        const search = document.getElementById('searchIn').value.toLowerCase();
        body.innerHTML = "";
        shifts.forEach((s, i) => {
            if (s[0].toLowerCase().includes(search) || s[1].includes(search)) {
                body.innerHTML += `<tr><td>${s[0]}<br><small>${s[1]}</small></td><td>${s[2]}<br>${s[3]}-${s[4]}</td><td><button style="color:var(--danger); background:none; border:none; cursor:pointer;" onclick="deleteShift(${i})">✖</button></td></tr>`;
            }
        });
    }

    function addShift() {
        const n = document.getElementById('nameIn').value, p = document.getElementById('phoneIn').value;
        if (!n || !p) return alert("חסר שם/טלפון");
        shifts.push([n, p, document.getElementById('dayIn').value, document.getElementById('startIn').value || "00:00", document.getElementById('endIn').value || "00:00"]);
        localStorage.setItem('klm_shifts', JSON.stringify(shifts));
        renderAdmin();
    }

    function deleteShift(i) { if (confirm("למחוק?")) { shifts.splice(i, 1); localStorage.setItem('klm_shifts', JSON.stringify(shifts)); renderAdmin(); } }

    function sortShiftsByRelevance() {
        const today = getDayInfo(new Date());
        shifts.sort((a, b) => {
            if (a[2] === today && b[2] !== today) return -1;
            if (a[2] !== today && b[2] === today) return 1;
            return toMin(a[3]) - toMin(b[3]);
        });
        localStorage.setItem('klm_shifts', JSON.stringify(shifts));
        renderAdmin();
    }

    function toggleView(v) {
        document.getElementById('mainView').style.display = v === 'main' ? 'block' : 'none';
        document.getElementById('adminView').style.display = v === 'admin' ? 'block' : 'none';
        document.getElementById('btnMain').className = v === 'main' ? 'btn active' : 'btn';
        document.getElementById('btnAdmin').className = v === 'admin' ? 'btn active' : 'btn';
        v === 'main' ? renderMain() : renderAdmin();
    }

    renderMain();
</script>
</body>
</html>
