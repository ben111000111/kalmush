<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>קלמוש</title>
    <style>
        :root {
            --bg: #0f172a;
            --panel: #1e293b;
            --accent: #38bdf8;
            --success: #22c55e;
            --warning: #f59e0b;
            --danger: #f43f5e;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: var(--bg);
            color: var(--text-main);
            direction: rtl;
        }

        header {
            background: rgba(30, 41, 59, 0.95);
            backdrop-filter: blur(10px);
            padding: 15px;
            text-align: center;
            border-bottom: 2px solid var(--accent);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        h1 { margin: 0; font-size: 1.8rem; color: var(--accent); }

        #clock {
            font-family: 'Courier New', monospace;
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--success);
            text-shadow: 0 0 10px rgba(34, 197, 94, 0.3);
        }

        .nav {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 15px 0;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.1);
            background: var(--panel);
            color: white;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        .btn.active { background: var(--accent); color: var(--bg); }

        .container { max-width: 800px; margin: auto; padding: 0 15px; }

        /* כרטיסיות כוננים */
        .card {
            background: var(--panel);
            border-radius: 15px;
            padding: 18px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .primary-card {
            border: 2px solid var(--success);
            background: linear-gradient(145deg, #1e293b, #0f172a);
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }

        .card-info h3 { margin: 0; font-size: 1.3rem; }
        .card-info p { margin: 5px 0 0; color: var(--accent); font-size: 1.1rem; font-weight: bold; }
        
        .tag {
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 4px;
            background: rgba(56, 189, 248, 0.2);
            color: var(--accent);
            margin-bottom: 5px;
            display: inline-block;
        }

        /* ניהול */
        .admin-form {
            background: var(--panel);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .admin-form input, .admin-form select {
            background: var(--bg);
            border: 1px solid #334155;
            color: white;
            padding: 10px;
            border-radius: 6px;
        }

        table { width: 100%; border-collapse: collapse; background: var(--panel); font-size: 0.85rem; }
        th { background: #334155; padding: 10px; text-align: right; }
        td { padding: 10px; border-bottom: 1px solid #334155; }

        .btn-del { color: var(--danger); background: none; border: none; cursor: pointer; font-size: 1rem; }

        @media (max-width: 600px) {
            .admin-form { grid-template-columns: 1fr; }
            .card { flex-direction: column; text-align: center; gap: 10px; }
        }
    </style>
</head>
<body>

<header>
    <h1>קלמוש</h1>
    <div id="clock">00:00:00</div>
    <div id="date-info" style="color: var(--text-muted); font-size: 0.9rem;"></div>
</header>

<div class="nav">
    <button class="btn active" id="btnMain" onclick="toggleView('main')">תצוגת כוננים</button>
    <button class="btn" id="btnAdmin" onclick="toggleView('admin')">ניהול משמרות</button>
</div>

<div class="container" id="mainView">
    <div id="activeContainer"></div>
    <h3 style="margin-top: 30px; color: var(--warning); border-right: 4px solid var(--warning); padding-right: 10px;">גיבוי וחירום</h3>
    <div id="backupContainer"></div>
</div>

<div class="container" id="adminView" style="display:none;">
    <div class="admin-form">
        <input type="text" id="nameIn" placeholder="שם כונן" style="grid-column: span 2;">
        <input type="text" id="phoneIn" placeholder="טלפון">
        <select id="dayIn">
            <option value="כל יום">כל יום</option>
            <option value="ראשון">ראשון</option>
            <option value="שני">שני</option>
            <option value="שלישי">שלישי</option>
            <option value="רביעי">רביעי</option>
            <option value="חמישי">חמישי</option>
            <option value="שישי">שישי</option>
            <option value="מוצאי שבת">מוצאי שבת</option>
            <option value="א ב ג ד ה">א ב ג ד ה</option>
        </select>
        <input type="time" id="startIn">
        <input type="time" id="endIn">
        <button class="btn active" onclick="addShift()" style="grid-column: span 2;">הוסף כונן</button>
    </div>
    <div style="overflow-x: auto;">
        <table id="adminTable">
            <thead>
                <tr>
                    <th>כונן</th>
                    <th>זמן</th>
                    <th>מחק</th>
                </tr>
            </thead>
            <tbody id="adminBody"></tbody>
        </table>
    </div>
</div>

<script>
    // הרשימה המלאה כפי שסופקה
    const initialShifts = [
        ["יעקב ישראל פלמן","0548435028","כל יום","23:45","00:15"],
        ["מרדכי בלס","0548419190","כל יום","22:00","01:00"],
        ["זאב ביליצר","0527614282","כל יום","23:00","00:00"],
        ["נפתלי סנראי","0548090192","כל יום","23:00","01:30"],
        ["מיכאל פינדר","0548445644","כל יום","23:00","01:00"],
        ["יצחק קרלינסקי","0527694427","כל יום","23:30","01:00"],
        ["אברהם קורנברג","0584158762","כל יום","00:00","01:30"],
        ["משה גרייזמן","0548425337","מוצאי שבת","23:00","04:30"],
        ["ישראל מובשוביץ","0527152353","ראשון","23:00","04:30"],
        ["מרדכי בלס","0548419190","שני","23:00","04:30"],
        ["שמואל דינין","0504116626","שלישי","23:00","04:30"],
        ["יצחק קרלינסקי","0527694427","רביעי","23:00","04:30"],
        ["ישראל קהן","0583299194","חמישי","23:00","04:30"],
        ["אהרון מרדכי מילר","0527160151","כל יום","04:30","08:30"],
        ["אריה קוזניץ","0583288201","א ב ג ד ה","08:30","09:30"],
        ["בן ציון ברדפיס","0527148403","א ב ג ד ה","09:30","13:00"],
        ["יעקב ישראל פלמן","0548435028","כל יום","09:00","13:15"],
        ["יעקב סלמון","0502487806","כל יום","10:00","13:30"],
        ["אלישע הגלר","0533171982","כל יום","11:00","12:00"],
        ["ישראל קהן","0583299194","שישי","10:00","12:00"],
        ["יעקב סלמון","0502487806","כל יום","13:30","14:00"],
        ["יהושע זאבי","0548482257","ב ג ה","13:30","15:30"],
        ["ישראל קהן","0583299194","כל יום","13:30","15:15"],
        ["מרדכי שמואל אדלשטיין","0556749482","כל יום","14:00","15:45"],
        ["אליהו שטיימן","0527663896","כל יום","14:00","14:30"],
        ["אריה קוזניץ","0583288201","כל יום","14:00","16:00"],
        ["יעקב ישראל לסמן","0504147053","כל יום","14:00","16:00"],
        ["משה גרייזמן","0548425337","כל יום","15:00","16:00"],
        ["אהרון מרדכי מילר","0527160151","כל יום","16:00","19:00"],
        ["משה גרייזמן","0548425337","כל יום","16:00","19:00"],
        ["דוד שקלאר","0526289005","כל יום","16:00","19:00"],
        ["יעקב ישראל לסמן","0504147053","כל יום","16:00","19:00"],
        ["אהרון מרדכי מילר","0527160151","כל יום","19:00","21:00"],
        ["יעקב ישראל לסמן","0504147053","כל יום","19:00","23:00"],
        ["דוד שקלאר","0526289005","כל יום","19:00","23:00"],
        ["יהודה בנדיקט","0528442341","כל יום","20:30","21:30"],
        ["יעקב סלמון","0502487806","כל יום","21:00","23:00"],
        ["אריה קוזניץ","0583288201","כל יום","21:00","23:00"],
        ["זאב ביליצר","0527614282","כל יום","22:00","23:00"],
        ["נפתלי סנראי","0548090192","כל יום","22:30","23:00"],
        ["יוסי ביטון","0583214835","כל יום","07:00","23:00"],
        ["אליהו סלמון","0527160570","כל יום","07:00","23:00"],
        ["שמואל דינין","0504152156","כל יום","07:00","23:00"],
        ["עקיבא יוסף קניג","0504116626","כל יום","00:00","00:00"],
        ["אשתו של קניג חירום בלבד","0548408939","כל יום","00:00","00:00"],
        ["בנימין הקשר","0527158183","כל יום","00:00","00:00"]
    ];

    let shifts = JSON.parse(localStorage.getItem('klm_shifts')) || initialShifts;

    function getTodayLabel() {
        const now = new Date();
        const day = now.getDay();
        const hour = now.getHours();
        if (day === 6 && hour >= 18) return "מוצאי שבת";
        return ["ראשון", "שני", "שלישי", "רביעי", "חמישי", "שישי", "שבת"][day];
    }

    function updateTime() {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString('he-IL', {hour12: false});
        document.getElementById('date-info').innerText = getTodayLabel() + " | " + now.toLocaleDateString('he-IL');
    }
    setInterval(updateTime, 1000); updateTime();

    function toMin(t) {
        if (!t) return 0;
        const [h, m] = t.split(':').map(Number);
        return h * 60 + m;
    }

    function renderMain() {
        const activeContainer = document.getElementById('activeContainer');
        const backupContainer = document.getElementById('backupContainer');
        activeContainer.innerHTML = ""; backupContainer.innerHTML = "";

        const now = new Date();
        const curMin = toMin(now.getHours() + ":" + now.getMinutes());
        const today = getTodayLabel();
        const isWeekday = "א ב ג ד ה".includes(today);

        let active = [];
        let backups = [];

        shifts.forEach(s => {
            const [name, phone, day, startStr, endStr] = s;
            const start = toMin(startStr);
            const end = toMin(endStr);
            const isBackup = (startStr === "00:00" && endStr === "00:00");

            const dayMatch = (day === "כל יום" || day === today || (isWeekday && day === "א ב ג ד ה") || (day.includes(today)));

            if (dayMatch) {
                if (isBackup) backups.push(s);
                else {
                    const inRange = start < end ? (curMin >= start && curMin < end) : (curMin >= start || curMin < end);
                    if (inRange) active.push(s);
                }
            }
        });

        active.sort((a, b) => {
            if (a[2] !== b[2]) {
                if (a[2] === today) return -1;
                if (b[2] === today) return 1;
            }
            return toMin(a[3]) - toMin(b[3]);
        });

        active.forEach((s, i) => {
            activeContainer.innerHTML += `
                <div class="card ${i === 0 ? 'primary-card' : ''}">
                    <div class="card-info">
                        <span class="tag">${s[2]}</span>
                        <h3>${s[0]}</h3>
                        <p>${s[1]}</p>
                    </div>
                    <div style="text-align: left; font-size: 0.9rem;">
                        <div style="color: var(--text-muted)">משמרת</div>
                        <div style="font-weight: bold;">${s[3]} - ${s[4]}</div>
                    </div>
                </div>`;
        });

        backups.forEach(s => {
            backupContainer.innerHTML += `
                <div class="card" style="border-right: 4px solid var(--warning);">
                    <div class="card-info">
                        <h3>${s[0]}</h3>
                        <p>${s[1]}</p>
                    </div>
                </div>`;
        });
    }

    function renderAdmin() {
        const body = document.getElementById('adminBody');
        body.innerHTML = "";
        shifts.forEach((s, i) => {
            body.innerHTML += `<tr>
                <td><strong>${s[0]}</strong><br><small>${s[1]}</small></td>
                <td>${s[2]}<br>${s[3]}-${s[4]}</td>
                <td><button class="btn-del" onclick="deleteShift(${i})">✖</button></td>
            </tr>`;
        });
    }

    function addShift() {
        const name = document.getElementById('nameIn').value;
        const phone = document.getElementById('phoneIn').value;
        if (!name || !phone) return alert("מלא שם וטלפון");
        shifts.push([name, phone, document.getElementById('dayIn').value, document.getElementById('startIn').value || "00:00", document.getElementById('endIn').value || "00:00"]);
        localStorage.setItem('klm_shifts', JSON.stringify(shifts));
        renderAdmin();
        alert("נוסף");
    }

    function deleteShift(i) {
        if (confirm("למחוק?")) {
            shifts.splice(i, 1);
            localStorage.setItem('klm_shifts', JSON.stringify(shifts));
            renderAdmin();
        }
    }

    function toggleView(v) {
        document.getElementById('mainView').style.display = v === 'main' ? 'block' : 'none';
        document.getElementById('adminView').style.display = v === 'admin' ? 'block' : 'none';
        document.getElementById('btnMain').classList.toggle('active', v === 'main');
        document.getElementById('btnAdmin').classList.toggle('active', v === 'admin');
        v === 'main' ? renderMain() : renderAdmin();
    }

    renderMain();
</script>

</body>
</html>
