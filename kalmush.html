<style>
body{
  margin:0;
  font-family:Arial,Helvetica,sans-serif;
  background:#f4f6f9;
}
header{
  background:#111827;
  color:white;
  padding:20px;
  text-align:center;
}
#clock{
  font-size:32px;
  font-weight:bold;
}
.container{
  padding:15px;
  max-width:1100px;
  margin:auto;
}
.card{
  background:white;
  border-radius:14px;
  padding:14px;
  margin-bottom:10px;
  box-shadow:0 4px 10px rgba(0,0,0,0.08);
}
.primary{
  border:3px solid #16a34a;
  font-size:22px;
}
.secondary{
  font-size:16px;
}
.backup{
  background:#fef3c7;
}
.emergency{
  background:#fee2e2;
  border:2px solid red;
  font-weight:bold;
}
h2{
  margin-top:25px;
}
button{
  padding:8px 14px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}
.nav{
  text-align:center;
  margin:10px;
}
input,select{
  padding:6px;
  border-radius:6px;
  border:1px solid #ccc;
}
table{
  width:100%;
  border-collapse:collapse;
}
th,td{
  padding:8px;
  border-bottom:1px solid #ddd;
  font-size:14px;
}
@media(max-width:768px){
  #clock{font-size:22px;}
  .primary{font-size:18px;}
  table{font-size:12px;}
}
</style>
</head>

function nowInfo(){
  let now=new Date();
  document.getElementById("clock").innerText=
  now.toLocaleDateString("he-IL")+" "+now.toLocaleTimeString("he-IL");
}

setInterval(nowInfo,1000); nowInfo();

function showMain(){
  document.getElementById("mainView").style.display="block";
  document.getElementById("adminView").style.display="none";
  renderMain();
}

function showAdmin(){
  document.getElementById("mainView").style.display="none";
  document.getElementById("adminView").style.display="block";
  renderAdmin();
}

function timeToMin(t){
  let [h,m]=t.split(":").map(Number);
  return h*60+m;
}

function renderMain(){
  let container=document.getElementById("mainView");
  container.innerHTML="";
  let now=new Date();
  let current=timeToMin(now.toTimeString().slice(0,5));

  let active=[];
  let backups=[];

  shifts.forEach(s=>{
    let start=timeToMin(s[3]);
    let end=timeToMin(s[4]);
    let isBackup = (s[3]=="00:00" && s[4]=="00:00");
    let inRange = start<=end ? (current>=start && current<=end)
                             : (current>=start || current<=end);
    if(isBackup) backups.push(s);
    else if(inRange) active.push(s);
  });

  active.sort((a,b)=>timeToMin(a[3])-timeToMin(b[3]));

  if(active.length>0){
    let primary=active[0];
    let div=document.createElement("div");
    div.className="card primary";
    div.innerHTML="<b>ראשי:</b><br>"+primary[0]+"<br>"+primary[1]+"<br>"+primary[3]+"-"+primary[4];
    container.appendChild(div);

    active.slice(1).forEach(s=>{
      let d=document.createElement("div");
      d.className="card secondary";
      d.innerHTML=s[0]+"<br>"+s[1]+"<br>"+s[3]+"-"+s[4];
      container.appendChild(d);
    });
  }

  if(backups.length>0){
    let h=document.createElement("h2");
    h.innerText="גיבויים";
    container.appendChild(h);

    backups.forEach(s=>{
      let d=document.createElement("div");
      d.className="card backup";
      if(s[0].includes("חירום")) d.classList.add("emergency");
      d.innerHTML=s[0]+"<br>"+s[1];
      container.appendChild(d);
    });
  }
}

function renderAdmin(){
  let div=document.getElementById("adminView");
  let html="<h2>ניהול משמרות</h2><table><tr><th>שם</th><th>טלפון</th><th>יום</th><th>משעה</th><th>עד</th></tr>";
  shifts.forEach(s=>{
    html+="<tr><td>"+s[0]+"</td><td>"+s[1]+"</td><td>"+s[2]+"</td><td>"+s[3]+"</td><td>"+s[4]+"</td></tr>";
  });
  html+="</table>";
  div.innerHTML=html;
}

renderMain();
