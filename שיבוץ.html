<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>יד שרה | ניהול שיבוצים מבוסס ענן</title>
    <style>
        :root {
            --bg: #0a0f18;
            --panel: #161f2e;
            --accent: #38bdf8;
            --success: #22c55e;
            --danger: #f43f5e;
            --warning: #f59e0b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(255,255,255,0.1);
        }

        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text-main); direction: rtl; display: flex; flex-direction: column; min-height: 100vh; }
        header { background: rgba(22, 31, 46, 0.9); padding: 10px; text-align: center; border-bottom: 1px solid var(--border); }
        .container { max-width: 1400px; margin: 0 auto; padding: 0 15px; flex: 1; width: 100%; box-sizing: border-box; }

        .week-title-display { text-align: center; margin: 20px 0; padding: 15px; background: linear-gradient(145deg, #1e293b, #0f172a); border-radius: 15px; border-bottom: 4px solid var(--accent); box-shadow: 0 8px 25px rgba(0,0,0,0.4); }
        .week-title-display h2 { font-size: 2.2rem; margin: 5px 0; }

        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; background: var(--panel); padding: 12px 20px; border-radius: 12px; border: 1px solid var(--border); }
        .lock-status { cursor: pointer; display: flex; align-items: center; gap: 8px; font-weight: bold; padding: 5px 12px; border-radius: 20px; background: rgba(0,0,0,0.2); }
        .status-locked { color: var(--danger); }
        .status-unlocked { color: var(--success); border: 1px solid var(--success); }

        .admin-only { display: none; margin-bottom: 20px; }
        body.unlocked .admin-only { display: flex; gap: 10px; justify-content: center; }

        .btn { padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-new { background: var(--success); color: #000; }
        .btn-del { background: var(--danger); color: white; }
        .btn-dup { background: var(--accent); color: #000; }
        
        .row-ctrl { padding: 2px 8px; font-size: 1rem; margin: 2px; background: #1e293b; color: white; border: 1px solid var(--accent); border-radius: 4px; cursor: pointer; }

        .table-wrapper { overflow-x: auto; background: var(--panel); border-radius: 15px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        table { width: 100%; border-collapse: collapse; min-width: 1100px; }
        th, td { border: 1px solid var(--border); padding: 6px; text-align: center; position: relative; }
        th { background: rgba(56, 189, 248, 0.1); color: var(--accent); padding: 12px; font-size: 0.9rem; }

        .shift-type-cell { background: rgba(34, 197, 94, 0.08); font-weight: bold; color: var(--success); width: 85px; }
        
        .slot-container { display: flex; flex-direction: column; gap: 2px; position: relative; min-height: 55px; justify-content: center; border-radius: 6px; padding: 4px; transition: background 0.3s ease; }
        .name-input { width: 100%; background: transparent; border: none; color: white; text-align: center; font-size: 1rem; outline: none; font-weight: bold; }
        .note-input { width: 100%; background: transparent; border: none; color: var(--warning); text-align: center; font-size: 0.75rem; outline: none; font-style: italic; }
        
        /* צבעי משבצות */
        .bg-none { background: transparent; }
        .bg-blue { background: rgba(56, 189, 248, 0.3); }
        .bg-green { background: rgba(34, 197, 94, 0.3); }
        .bg-red { background: rgba(244, 63, 94, 0.4); }
        .bg-purple { background: rgba(168, 85, 247, 0.3); }
        .bg-orange { background: rgba(245, 158, 11, 0.4); }
        .bg-pink { background: rgba(236, 72, 153, 0.3); }
        .bg-teal { background: rgba(20, 184, 166, 0.3); }
        .bg-yellow { background: rgba(234, 179, 8, 0.3); }

        .cell-paint-btn { position: absolute; top: 2px; left: 2px; font-size: 0.7rem; cursor: pointer; opacity: 0; transition: 0.2s; z-index: 5; }
        body.unlocked .slot-container:hover .cell-paint-btn { opacity: 0.6; }
        body.unlocked .cell-paint-btn:hover { opacity: 1; transform: scale(1.2); }

        body:not(.unlocked) input { pointer-events: none; }
        input::placeholder { color: transparent; }
        body.unlocked input::placeholder { color: rgba(255,255,255,0.05); }

        #loadingOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); display: flex; justify-content: center; align-items: center; z-index: 1000; font-weight: bold; color: var(--accent); }

        footer { text-align: center; padding: 25px; font-size: 0.8rem; color: var(--text-muted); opacity: 0.6; }
        select { background: #0f172a; color: white; border: 1px solid var(--accent); padding: 6px 12px; border-radius: 8px; outline: none; cursor: pointer; }
    </style>
</head>
<body>

<div id="loadingOverlay">טוען נתונים מהענן...</div>

<header><h1>מערכת שיבוץ | מוקד מצוקה</h1></header>

<div class="container">
    <div class="week-title-display">
        <h2 id="currentWeekHeading">טוען...</h2>
    </div>

    <div class="top-bar">
        <div id="lockBtn" class="lock-status status-locked" onclick="handleLock()">
            <span id="lockIcon">🔒</span> <span id="lockText">לוח נעול</span>
        </div>
        <div class="week-select-area">
            <span>בחר שבוע:</span>
            <select id="weekSelector" onchange="changeWeek()"></select>
        </div>
    </div>

    <div class="admin-only">
        <button class="btn btn-new" onclick="createNewWeek()">+ שבוע חדש</button>
        <button class="btn btn-dup" onclick="duplicateWeek()">שכפל שבוע</button>
        <button class="btn btn-del" onclick="deleteCurrentWeek()">מחק שבוע</button>
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>משמרת</th>
                    <th style="color: var(--warning);">מוצ"ש</th>
                    <th>ראשון</th><th>שני</th><th>שלישי</th><th>רביעי</th><th>חמישי</th><th>שישי</th><th>שבת</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<footer>יד שרה - מוקד מצוקה | © 2026</footer>

<script>
    // הגדרות API וחיבור
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw-9S7zEju9GpY_vR6WrpJIJFz7d__MvB8gR_j874GXvQN8ThISiQ9dj5wiQoKG5zokng/exec";
    const SECRET_CODE = "שיבוץ אחמש.";
    const dayOrder = [7, 0, 1, 2, 3, 4, 5, 6];
    const cellColors = ['none', 'blue', 'green', 'red', 'purple', 'orange', 'pink', 'teal', 'yellow'];

    let allWeeks = {};
    let currentWeekId = "";
    let isUnlocked = false;

    // פונקציות תקשורת עם גוגל שיטס
    async function loadFromCloud() {
        try {
            const response = await fetch(SCRIPT_URL);
            const data = await response.json();
            if (data && data.allWeeks) {
                allWeeks = data.allWeeks;
                currentWeekId = data.currentWeekId;
            } else {
                // שבוע ראשון אם הגיליון ריק
                currentWeekId = "שבוע 1";
                allWeeks[currentWeekId] = getEmptyWeek();
            }
        } catch (e) {
            console.error("טעינה נכשלה:", e);
            alert("שגיאה בחיבור לענן. מציג נתונים מקומיים.");
        } finally {
            document.getElementById('loadingOverlay').style.display = 'none';
            initSelector();
            renderTable();
            document.getElementById('currentWeekHeading').innerText = currentWeekId;
        }
    }

    async function syncToCloud() {
        const payload = JSON.stringify({ allWeeks, currentWeekId });
        try {
            // mode: no-cors משמש למניעת שגיאות CORS מול Apps Script בשליחה
            await fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                cache: 'no-cache',
                body: payload
            });
            console.log("סונכרן לענן");
        } catch (e) {
            console.error("סנכרון נכשל:", e);
        }
    }

    function getEmptyWeek() {
        return {
            config: { 'בוקר': 3, 'ערב': 3, 'לילה': 1 },
            cellColors: {},
            data: {} 
        };
    }

    function handleLock() {
        if (!isUnlocked) {
            if (prompt("הכנס קוד עריכה:") === SECRET_CODE) {
                isUnlocked = true;
                document.body.classList.add('unlocked');
                document.getElementById('lockIcon').innerText = "🔓";
                document.getElementById('lockText').innerText = "מצב עריכה פעיל";
                document.getElementById('lockBtn').className = "lock-status status-unlocked";
            } else alert("קוד שגוי!");
        } else {
            isUnlocked = false;
            document.body.classList.remove('unlocked');
            document.getElementById('lockIcon').innerText = "🔒";
            document.getElementById('lockText').innerText = "לוח נעול";
            document.getElementById('lockBtn').className = "lock-status status-locked";
        }
        renderTable();
    }

    function renderTable() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = "";
        const week = allWeeks[currentWeekId];
        if (!week) return;

        ['בוקר', 'ערב', 'לילה'].forEach(type => {
            const rows = week.config[type] || 1;
            for (let i = 0; i < rows; i++) {
                let tr = document.createElement('tr');
                if (i === 0) {
                    tr.innerHTML += `<td class="shift-type-cell" rowspan="${rows}">
                        ${type}<br>
                        <div class="admin-only">
                            <button class="row-ctrl" onclick="updateRows('${type}', 1)">+</button>
                            <button class="row-ctrl" onclick="updateRows('${type}', -1)">-</button>
                        </div>
                    </td>`;
                }

                dayOrder.forEach(d => {
                    const cellId = `${type}-${i}-${d}`;
                    const nameVal = week.data[cellId] || "";
                    const noteVal = week.data['note-'+cellId] || "";
                    const colorClass = "bg-" + (week.cellColors[cellId] || 'none');
                    const isSaturdayDisabled = (d === 6 && i >= 2 && type !== 'לילה');

                    if (isSaturdayDisabled) {
                        tr.innerHTML += `<td style="background: rgba(0,0,0,0.3)"></td>`;
                    } else {
                        tr.innerHTML += `<td>
                            <div id="cont-${cellId}" class="slot-container ${colorClass}">
                                <span class="cell-paint-btn" onclick="cycleCellColor('${cellId}')">🎨</span>
                                <input type="text" class="name-input" placeholder="תקן" value="${nameVal}" oninput="updateData('${cellId}', this.value)">
                                <input type="text" class="note-input" placeholder="הערה" value="${noteVal}" oninput="updateData('note-${cellId}', this.value)">
                            </div>
                        </td>`;
                    }
                });
                tbody.appendChild(tr);
            }
        });
    }

    function cycleCellColor(cellId) {
        const week = allWeeks[currentWeekId];
        const curr = week.cellColors[cellId] || 'none';
        const next = cellColors[(cellColors.indexOf(curr) + 1) % cellColors.length];
        week.cellColors[cellId] = next;
        
        const el = document.getElementById('cont-' + cellId);
        cellColors.forEach(c => el.classList.remove('bg-' + c));
        el.classList.add('bg-' + next);
        syncToCloud();
    }

    function updateRows(type, diff) {
        allWeeks[currentWeekId].config[type] = Math.max(1, (allWeeks[currentWeekId].config[type] || 1) + diff);
        renderTable();
        syncToCloud();
    }

    let timeout = null;
    function updateData(id, val) {
        allWeeks[currentWeekId].data[id] = val;
        // Debounce: חוסך שליחות מיותרות בזמן הקלדה מהירה
        clearTimeout(timeout);
        timeout = setTimeout(syncToCloud, 1000);
    }

    function createNewWeek() {
        const name = prompt("שם השבוע החדש:");
        if (name && !allWeeks[name]) {
            allWeeks[name] = getEmptyWeek();
            currentWeekId = name;
            saveAndRefresh();
        }
    }

    function duplicateWeek() {
        const name = prompt("שם לשבוע המשוכפל:");
        if (name && !allWeeks[name]) {
            allWeeks[name] = JSON.parse(JSON.stringify(allWeeks[currentWeekId]));
            currentWeekId = name;
            saveAndRefresh();
        }
    }

    function deleteCurrentWeek() {
        if (Object.keys(allWeeks).length > 1 && confirm("למחוק שבוע זה?")) {
            delete allWeeks[currentWeekId];
            currentWeekId = Object.keys(allWeeks)[0];
            saveAndRefresh();
        }
    }

    function changeWeek() {
        currentWeekId = document.getElementById('weekSelector').value;
        document.getElementById('currentWeekHeading').innerText = currentWeekId;
        renderTable();
        syncToCloud();
    }

    function saveAndRefresh() {
        syncToCloud();
        initSelector();
        renderTable();
        document.getElementById('currentWeekHeading').innerText = currentWeekId;
    }

    function initSelector() {
        const sel = document.getElementById('weekSelector');
        sel.innerHTML = "";
        Object.keys(allWeeks).forEach(id => {
            sel.innerHTML += `<option value="${id}" ${id === currentWeekId ? 'selected' : ''}>${id}</option>`;
        });
    }

    // הפעלה ראשונית
    loadFromCloud();
</script>
</body>
</html>
